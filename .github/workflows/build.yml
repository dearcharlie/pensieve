name: Build Pensieve

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend deps
        run: pnpm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri (Rust)
        run: cargo build --manifest-path src-tauri/Cargo.toml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pensieve-linux
          path: src-tauri/target/debug/pensieve
          retention-days: 3

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend deps
        run: pnpm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri bundle (Windows MSI/EXE)
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload Windows MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: pensieve-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 3

      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: pensieve-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 3
